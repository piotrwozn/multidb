[advisories]
ignore = [
    # parquet 58.3.0 depends on paste; RUSTSEC marks paste unmaintained and has no safe upgrade.
    # Keep this scoped to the Parquet phase and revisit when parquet removes paste.
    "RUSTSEC-2024-0436",
    # hnsw_rs 0.3.4 depends on bincode 1.3.3; RustSec marks it unmaintained and has no safe upgrade.
    # The graph is rebuilt from durable vectors, so this phase does not use bincode for HNSW snapshots.
    "RUSTSEC-2025-0141",
]

[licenses]
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.9
exceptions = [
    # pgwire 0.36.3 pulls x509-certificate for SCRAM channel binding support.
    { allow = ["MPL-2.0"], crate = "x509-certificate" },
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "deny"
wildcards = "deny"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = [
    # OpenRaft/display-more is still on the older chrono-tz/phf stack while Arrow/DataFusion uses newer versions.
    { crate = "chrono-tz@0.8.6", reason = "openraft 0.10.0-alpha.27 depends on display-more 0.2.6, which has not moved to chrono-tz 0.10" },
    { crate = "phf@0.11.3", reason = "chrono-tz 0.8.x build/runtime stack keeps phf 0.11 while Arrow uses phf 0.12" },
    { crate = "phf@0.13.1", reason = "tokio-postgres 0.7.18 requires phf 0.13 while Arrow/DataFusion uses phf 0.12" },
    { crate = "phf_shared@0.11.3", reason = "paired with the unavoidable phf 0.11 transitive stack" },
    { crate = "phf_shared@0.13.1", reason = "paired with tokio-postgres 0.7.18 phf 0.13" },

    # TLS/PostgreSQL dependencies currently straddle two RustCrypto generations.
    { crate = "block-buffer@0.10.4", reason = "argon2 0.5.3 is the latest stable password-hash stack and still uses digest/block-buffer 0.10 while PostgreSQL/TLS crates use RustCrypto 0.11" },
    { crate = "const-oid@0.9.6", reason = "x509-cert/x509-certificate use const-oid 0.9 while postgres-protocol uses digest 0.11/const-oid 0.10" },
    { crate = "cpufeatures@0.2.17", reason = "argon2 0.5.3 remains on cpufeatures 0.2; moving to argon2 0.6 would require a pre-release auth dependency" },
    { crate = "crypto-common@0.1.7", reason = "paired with digest 0.10 for stable argon2 and dev-only sqllogictest while PostgreSQL/TLS crates use crypto-common 0.2" },
    { crate = "digest@0.10.7", reason = "stable argon2 0.5.3 and current sqllogictest 0.29.1 still use digest 0.10 while PostgreSQL/TLS crates use digest 0.11" },

    # DataFusion, HNSW, Wasmtime, Moka and std-adjacent crates are on different hashbrown/foldhash generations.
    { crate = "foldhash@0.1.5", reason = "hashbrown 0.15 is still required by hnsw_rs and Wasmtime 36" },
    { crate = "hashbrown@0.14.5", reason = "DataFusion 54 still uses dashmap with hashbrown 0.14" },
    { crate = "hashbrown@0.15.5", reason = "hnsw_rs and Wasmtime 36 still use hashbrown 0.15" },

    # RNG crates are split between ring/legacy phf, DataFusion/HNSW, and OpenRaft/postgres.
    { crate = "getrandom@0.2.17", reason = "ring and legacy RNG stacks still require getrandom 0.2" },
    { crate = "getrandom@0.3.4", reason = "DataFusion/HNSW/proptest RNG stack uses getrandom 0.3 while OpenRaft uses rand_core 0.10" },
    { crate = "r-efi@5.3.0", reason = "paired with getrandom 0.2 on some targets" },
    { crate = "wasi@0.14.7+wasi-0.2.4", reason = "tokio-postgres whoami target support uses wasi 0.14 while legacy getrandom uses wasi 0.11" },
    { crate = "rand@0.8.6", reason = "legacy phf/chrono-tz build stack still uses rand 0.8" },
    { crate = "rand@0.9.4", reason = "DataFusion/HNSW/proptest use rand 0.9 while OpenRaft uses rand 0.10" },
    { crate = "rand_chacha@0.3.1", reason = "paired with rand 0.8" },
    { crate = "rand_core@0.6.4", reason = "paired with rand 0.8" },
    { crate = "rand_core@0.9.5", reason = "paired with rand 0.9" },

    # DataFusion and OpenRaft intentionally use adjacent itertools releases.
    { crate = "itertools@0.14.0", reason = "DataFusion 54 pins itertools 0.14 while OpenRaft 0.10 alpha uses 0.15" },

    # Some transitive crates still depend on thiserror 1 while the project and current crates use thiserror 2.
    { crate = "thiserror@1.0.69", reason = "older transitive crates have not migrated to thiserror 2" },
    { crate = "thiserror-impl@1.0.69", reason = "proc-macro pair for thiserror 1" },

    # Windows target crates come from hnsw_rs/mmap-rs, ring/rustls, Wasmtime, and the current Tokio/tooling stack.
    { crate = "windows-sys@0.52.0", reason = "ring/rustls transitive target support still uses windows-sys 0.52" },
    { crate = "windows-sys@0.60.2", reason = "Wasmtime 36 uses windows-sys 0.60 while Tokio/tooling uses 0.61" },
    { crate = "windows-targets@0.48.5", reason = "hnsw_rs/mmap-rs still depends on windows 0.48" },
    { crate = "windows-targets@0.52.6", reason = "ring/rustls transitive target support still uses windows-targets 0.52" },
    { crate = "windows_aarch64_gnullvm@0.48.5", reason = "target crate paired with windows-targets 0.48" },
    { crate = "windows_aarch64_gnullvm@0.52.6", reason = "target crate paired with windows-targets 0.52" },
    { crate = "windows_aarch64_msvc@0.48.5", reason = "target crate paired with windows-targets 0.48" },
    { crate = "windows_aarch64_msvc@0.52.6", reason = "target crate paired with windows-targets 0.52" },
    { crate = "windows_i686_gnu@0.48.5", reason = "target crate paired with windows-targets 0.48" },
    { crate = "windows_i686_gnu@0.52.6", reason = "target crate paired with windows-targets 0.52" },
    { crate = "windows_i686_gnullvm@0.52.6", reason = "target crate paired with windows-targets 0.52" },
    { crate = "windows_i686_msvc@0.48.5", reason = "target crate paired with windows-targets 0.48" },
    { crate = "windows_i686_msvc@0.52.6", reason = "target crate paired with windows-targets 0.52" },
    { crate = "windows_x86_64_gnu@0.48.5", reason = "target crate paired with windows-targets 0.48" },
    { crate = "windows_x86_64_gnu@0.52.6", reason = "target crate paired with windows-targets 0.52" },
    { crate = "windows_x86_64_gnullvm@0.48.5", reason = "target crate paired with windows-targets 0.48" },
    { crate = "windows_x86_64_gnullvm@0.52.6", reason = "target crate paired with windows-targets 0.52" },
    { crate = "windows_x86_64_msvc@0.48.5", reason = "target crate paired with windows-targets 0.48" },
    { crate = "windows_x86_64_msvc@0.52.6", reason = "target crate paired with windows-targets 0.52" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
