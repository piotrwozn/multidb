name: Feature request
description: Propose a scoped improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Storage
        - Query
        - Replication
        - Control Plane API
        - Studio
        - SDK
        - Docker/ops
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or alternatives
      description: Existing tools, prior art, benchmarks or constraints.
    validations:
      required: false
