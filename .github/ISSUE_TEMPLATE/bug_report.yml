name: Bug report
description: Report a reproducible defect in MultiDB
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report. For security issues, use GitHub Security Advisories instead of a public issue.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Tag, commit SHA, or branch.
      placeholder: v0.1.0-preview.1 or commit SHA
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Include commands, config files and relevant logs.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, Docker version, Node version and Go version if relevant.
    validations:
      required: false
